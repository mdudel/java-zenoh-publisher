name: Javadoc HTML

# Regenerates the HTML Javadoc for both Maven modules on every push to
# main and publishes it to the gh-pages branch. GitHub Pages then serves
# it at https://mdudel.github.io/java-zenoh-publisher/
#
# ONE-TIME SETUP (per repo, after this workflow lands):
#   Settings -> Pages -> Source: "Deploy from a branch"
#                                Branch: gh-pages   Folder: / (root)
#   Settings -> Actions -> General -> Workflow permissions:
#                                Read and write permissions
#
# After that, every push to main rebuilds the docs; ~60-90 s per run.

on:
  push:
    branches: [main]
  workflow_dispatch:            # allows manual re-runs from the Actions tab

# Cancel any in-flight run when a newer push arrives so we don't stack
# stale doc builds. The concurrency group is per-branch (there's only
# ever one 'main' so this collapses to "one build at a time" for docs).
concurrency:
  group: javadoc-${{ github.ref }}
  cancel-in-progress: true

# gh-pages deploy needs contents:write. Everything else is read-only.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # JNI publisher module (top-level pom). The `-P !bundle-native`
      # (if present) or default profile compiles fine against the
      # vendored zenoh-java jar under vendor/repo/, which is checked
      # into the repo so CI has no external repo to reach for it.
      - name: Generate Javadoc for the JNI publisher module
        run: |
          mvn -B -q \
              -DskipTests \
              -Dmaven.javadoc.failOnError=false \
              javadoc:javadoc

      # Pure-Java module. Zero third-party runtime deps, so this build
      # is hermetic: no vendor/repo lookup needed.
      - name: Generate Javadoc for the pure-Java module
        run: |
          mvn -B -q \
              -f pure-java/pom.xml \
              -DskipTests \
              -Dmaven.javadoc.failOnError=false \
              javadoc:javadoc

      # Assemble the site: one landing page + one subdirectory per
      # module. Keeping the two Javadoc trees separate avoids classpath
      # conflicts between the JNI-vendored zenoh-java classes and the
      # pure-Java clean-room equivalents.
      - name: Assemble Pages site
        run: |
          set -eu
          rm -rf public
          mkdir -p public/jni public/pure-java

          # Maven puts Javadoc at target/site/apidocs/ by default; the
          # standard 'reports' path since maven-javadoc-plugin 3.x is
          # target/reports/apidocs/. Cover both, silently.
          if   [ -d target/site/apidocs ];        then cp -R target/site/apidocs/. public/jni/
          elif [ -d target/reports/apidocs ];     then cp -R target/reports/apidocs/. public/jni/
          else echo "::error::JNI Javadoc output not found"; exit 1
          fi

          if   [ -d pure-java/target/site/apidocs ];    then cp -R pure-java/target/site/apidocs/. public/pure-java/
          elif [ -d pure-java/target/reports/apidocs ]; then cp -R pure-java/target/reports/apidocs/. public/pure-java/
          else echo "::error::pure-java Javadoc output not found"; exit 1
          fi

          # Landing page pointing at the two subdirectories.
          COMMIT_SHORT="$(git rev-parse --short HEAD)"
          BUILT_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>java-zenoh-publisher &mdash; API docs</title>
            <style>
              body { font-family: system-ui, -apple-system, Segoe UI, sans-serif;
                     max-width: 720px; margin: 3em auto; padding: 0 1em;
                     color: #24292f; line-height: 1.5; }
              h1 { margin-bottom: 0.2em; }
              h1 + p { color: #57606a; margin-top: 0; }
              ul { padding-left: 1.2em; }
              li { margin: 0.6em 0; }
              a { color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
              code { background: #f6f8fa; padding: 0.1em 0.3em;
                     border-radius: 3px; font-size: 0.95em; }
              footer { margin-top: 3em; color: #57606a; font-size: 0.85em;
                       border-top: 1px solid #d0d7de; padding-top: 1em; }
            </style>
          </head>
          <body>
            <h1>java-zenoh-publisher &mdash; API docs</h1>
            <p>HTML Javadoc for both modules in this repository.</p>
            <ul>
              <li><a href="jni/index.html"><b>JNI publisher</b></a>
                  &mdash; <code>io.mdudel.zenoh.ZenohClient</code> and friends
                  (the original starter kit, backed by zenoh-java 1.9.0).</li>
              <li><a href="pure-java/index.html"><b>Pure-Java client</b></a>
                  &mdash; <code>io.mdudel.zenoh.purejava.*</code>: publisher,
                  subscriber, and scout. Zero runtime deps beyond JDK 17.</li>
            </ul>
            <p>Source: <a href="https://github.com/mdudel/java-zenoh-publisher">github.com/mdudel/java-zenoh-publisher</a></p>
            <footer>
              Built from commit
              <a href="https://github.com/mdudel/java-zenoh-publisher/commit/${COMMIT_SHORT}"><code>${COMMIT_SHORT}</code></a>
              at ${BUILT_AT}.
            </footer>
          </body>
          </html>
          HTML

          # .nojekyll tells GitHub Pages "serve this verbatim, don't run
          # Jekyll over it" - Javadoc's leading-underscore files
          # (_index.html on some layouts) would otherwise be dropped.
          touch public/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # Keep only the latest doc set; no history churn on gh-pages.
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(javadoc): rebuild from ${{ github.sha }}'
